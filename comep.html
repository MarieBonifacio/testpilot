<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestPilot — Rapport COMEP</title>
    <link rel="stylesheet" href="styles-prompt-library.css">
    <style>
        :root {
            --primary: #3B6D11; --primary-dark: #2d5309;
            --bg: #ffffff; --bg-alt: #f8f9fa;
            --text: #212529; --text-muted: #6c757d; --border: #dee2e6;
            --success: #28a745; --danger: #dc3545; --warning: #e8a020;
            --purple: #534AB7; --purple-light: #EEEDFE;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-alt); color: var(--text); min-height: 100vh; }

        .nav { background: white; border-bottom: 2px solid var(--primary); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .nav-brand { color: var(--primary); font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-brand::before { content: '✈'; }
        .nav-links { display: flex; gap: 4px; }
        .nav-link { padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; text-decoration: none; color: var(--text-muted); transition: all .15s; }
        .nav-link:hover { background: var(--bg-alt); color: var(--text); }
        .nav-link.active { background: rgba(59,109,17,0.1); color: var(--primary); }

        .container { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

        /* Actions bar */
        .actions-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .actions-bar h2 { font-size: 1.3rem; font-weight: 700; }
        .actions-bar p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .export-btns { display: flex; gap: 10px; }
        .btn-primary { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: .15s; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary { padding: 9px 18px; background: white; border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: .15s; }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .refresh-btn { font-size: 0.85rem; padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: white; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: .15s; }
        .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Score card */
        .score-section { display: grid; grid-template-columns: auto 1fr; gap: 24px; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 28px; align-items: center; }
        .score-dial { width: 140px; height: 140px; flex-shrink: 0; position: relative; }
        .score-dial canvas { width: 140px; height: 140px; }
        .score-dial-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score-number { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .score-number.green  { color: var(--success); }
        .score-number.amber  { color: var(--warning); }
        .score-number.red    { color: var(--danger); }
        .score-number.danger { color: #8b0000; }
        .score-label-text { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin-top: 2px; }
        .score-info h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .score-level { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }
        .score-level.green  { background: #d4edda; color: #155724; }
        .score-level.amber  { background: #fff3cd; color: #856404; }
        .score-level.red    { background: #f8d7da; color: #721c24; }
        .score-level.danger { background: #8b0000; color: white; }
        .score-components { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .comp-item { background: var(--bg-alt); border-radius: 6px; padding: 10px 12px; }
        .comp-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
        .comp-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
        .comp-bar-fill { height: 100%; border-radius: 3px; }
        .comp-bar-fill.green  { background: var(--success); }
        .comp-bar-fill.amber  { background: var(--warning); }
        .comp-bar-fill.red    { background: var(--danger); }
        .comp-value { font-size: 0.85rem; font-weight: 700; }
        .comp-value.green  { color: var(--success); }
        .comp-value.amber  { color: var(--warning); }
        .comp-value.red    { color: var(--danger); }

        /* Section layout */
        .section { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; margin-bottom: 20px; }
        .section-title { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }

        /* KPI row */
        .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .kpi { padding: 12px 14px; background: var(--bg-alt); border-radius: 8px; }
        .kpi-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 6px; }
        .kpi-val { font-size: 1.5rem; font-weight: 700; line-height: 1; }
        .kpi-val.green  { color: var(--success); }
        .kpi-val.amber  { color: var(--warning); }
        .kpi-val.red    { color: var(--danger); }
        .kpi-val.gray   { color: var(--text-muted); }
        .kpi-val.purple { color: var(--purple); }
        .kpi-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }

        /* Two-column layout */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        /* Features table */
        table.feat { width: 100%; border-collapse: collapse; }
        table.feat th { padding: 8px 12px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); text-align: left; border-bottom: 2px solid var(--border); }
        table.feat td { padding: 9px 12px; font-size: 0.85rem; border-bottom: 1px solid var(--bg-alt); }
        table.feat tr:last-child td { border-bottom: none; }
        .cov-bar-wrap { display: flex; align-items: center; gap: 8px; }
        .cov-bar { width: 70px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
        .cov-bar-fill { height: 100%; border-radius: 3px; }
        .cov-bar-fill.green  { background: var(--success); }
        .cov-bar-fill.amber  { background: var(--warning); }
        .cov-bar-fill.red    { background: var(--danger); }
        .cov-pct { font-size: 0.82rem; font-weight: 700; min-width: 34px; }
        .cov-pct.green  { color: var(--success); }
        .cov-pct.amber  { color: var(--warning); }
        .cov-pct.red    { color: var(--danger); }
        .badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
        .badge.high   { background: #f8d7da; color: #721c24; }
        .badge.medium { background: #fff3cd; color: #856404; }
        .badge.low    { background: #d4edda; color: #155724; }

        /* Risks */
        .risk-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--bg-alt); }
        .risk-item:last-child { border-bottom: none; }
        .risk-level-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
        .risk-level-dot.HIGH   { background: var(--danger); }
        .risk-level-dot.MEDIUM { background: var(--warning); }
        .risk-level-dot.LOW    { background: var(--success); }
        .risk-info { flex: 1; }
        .risk-title { font-size: 0.88rem; font-weight: 500; }
        .risk-reason { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
        .risk-badge { font-size: 0.68rem; padding: 1px 8px; border-radius: 20px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
        .risk-badge.HIGH   { background: #f8d7da; color: #721c24; }
        .risk-badge.MEDIUM { background: #fff3cd; color: #856404; }
        .risk-badge.LOW    { background: #d4edda; color: #155724; }

        /* Recommendations */
        .rec-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; }
        .rec-item.HIGH   { background: #fff5f5; border: 1px solid #f5c6cb; }
        .rec-item.MEDIUM { background: #fffbee; border: 1px solid #ffc107; }
        .rec-item.LOW    { background: #f0fff4; border: 1px solid #c3e6cb; }
        .rec-icon { font-size: 1rem; flex-shrink: 0; }
        .rec-text { font-size: 0.88rem; flex: 1; }
        .rec-prio { font-size: 0.68rem; font-weight: 700; padding: 1px 7px; border-radius: 20px; flex-shrink: 0; }
        .rec-prio.HIGH   { background: #f8d7da; color: #721c24; }
        .rec-prio.MEDIUM { background: #fff3cd; color: #856404; }
        .rec-prio.LOW    { background: #d4edda; color: #155724; }

        /* Trend mini-bars */
        .trend-list { display: flex; flex-direction: column; gap: 8px; }
        .trend-item { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
        .trend-name { min-width: 140px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .trend-bar-outer { flex: 1; height: 8px; background: var(--bg-alt); border-radius: 4px; overflow: hidden; }
        .trend-bar-inner { height: 100%; border-radius: 4px; }
        .trend-bar-inner.green  { background: var(--success); }
        .trend-bar-inner.amber  { background: var(--warning); }
        .trend-bar-inner.red    { background: var(--danger); }
        .trend-pct { min-width: 36px; text-align: right; font-weight: 700; font-size: 0.82rem; }

        /* Last campaign */
        .camp-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .camp-metric { padding: 10px; border-radius: 6px; text-align: center; }
        .camp-metric-val { font-size: 1.5rem; font-weight: 700; }
        .camp-metric-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }

        /* Empty / loader */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); background: white; border: 1px solid var(--border); border-radius: 10px; }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .loader { display: none; align-items: center; gap: 10px; color: var(--text-muted); padding: 40px; justify-content: center; }
        .loader.active { display: flex; }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Print styles */
        @media print {
            .nav, .actions-bar .export-btns, .refresh-btn { display: none !important; }
            body { background: white; }
            .container { max-width: 100%; padding: 0; }
            .section, .score-section { break-inside: avoid; }
        }

        @media (max-width: 900px) {
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .score-components { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .score-section { grid-template-columns: 1fr; justify-items: center; }
            .camp-summary { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<div class="container">
    <div class="actions-bar">
        <div>
            <h2>Rapport COMEP</h2>
            <p>Synthèse qualité — score de confiance, risques résiduels et recommandations.</p>
        </div>
        <div class="export-btns">
            <button class="refresh-btn" onclick="loadReport()">↻ Actualiser</button>
            <button class="btn-secondary" onclick="generateNarrative()" id="btnNarrative" disabled>Commentaire COMEP IA</button>
            <button class="btn-secondary" onclick="exportHTML()" id="btnExportHTML" disabled>Exporter HTML</button>
            <button class="btn-primary" onclick="printReport()" id="btnPrint" disabled>Imprimer / PDF</button>
        </div>
    </div>

    <div id="reportContent">
        <div class="loader active"><div class="spinner"></div><span>Chargement du rapport…</span></div>
    </div>
</div>

<script src="api-client.js"></script>
<script>
"use strict";

function esc(t) { const d = document.createElement('div'); d.textContent = String(t||''); return d.innerHTML; }
function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function fmtDateTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function rateColor(pct) {
    return pct >= 80 ? 'green' : pct >= 60 ? 'amber' : 'red';
}

let state = { projectId: null, report: null, narrative: null };

async function loadReport() {
    if (!state.projectId) {
        document.getElementById('reportContent').innerHTML = renderEmpty('project');
        return;
    }
    document.getElementById('reportContent').innerHTML = '<div class="loader active"><div class="spinner"></div><span>Génération du rapport…</span></div>';
    document.getElementById('btnExportHTML').disabled = true;
    document.getElementById('btnPrint').disabled = true;
    try {
        const report = await TestPilotAPI.Reports.comep(state.projectId);
        state.report = report;
        state.narrative = null;
        renderReport(report);
        document.getElementById('btnExportHTML').disabled = false;
        document.getElementById('btnPrint').disabled = false;
        document.getElementById('btnNarrative').disabled = false;
    } catch(e) {
        document.getElementById('reportContent').innerHTML = `<div class="empty"><p>Erreur : ${esc(e.message)}</p></div>`;
    }
}

function renderReport(r) {
    const el = document.getElementById('reportContent');
    el.innerHTML = `
        ${renderScoreSection(r)}
        <div id="narrativeBlock" style="display:none;"></div>
        ${renderKPIs(r)}
        <div class="two-col">
            ${renderFeatures(r)}
            ${renderTrend(r)}
        </div>
        ${renderRisks(r)}
        ${renderRecommendations(r)}
        ${renderLastCampaign(r)}
        ${r.lastAnalysis ? renderAnalysis(r) : ''}
        <p style="font-size:0.75rem;color:var(--text-muted);text-align:right;margin-top:16px;">
            Rapport généré le ${fmtDateTime(r.generated_at)} · Projet : ${esc(r.project?.name || '—')}
        </p>
    `;
    drawDial(r.score);
}

function renderScoreSection(r) {
    const s = r.score;
    const comps = s.components;
    function compColor(v) { return v >= 80 ? 'green' : v >= 55 ? 'amber' : 'red'; }

    const compItems = [
        { label: 'Couverture',   val: comps.coverage,           weight: '30%' },
        { label: 'Traçabilité',  val: comps.traceability,        weight: '20%' },
        { label: 'Taux pass',    val: comps.pass_rate,           weight: '30%' },
        { label: 'Critiques',    val: comps.critical_coverage,   weight: '20%' }
    ].map(c => `
        <div class="comp-item">
            <div class="comp-label">${c.label} <span style="font-weight:400;font-size:0.68rem;">(${c.weight})</span></div>
            <div class="comp-bar"><div class="comp-bar-fill ${compColor(c.val)}" style="width:${c.val}%"></div></div>
            <div class="comp-value ${compColor(c.val)}">${c.val}%</div>
        </div>`).join('');

    return `
    <div class="score-section">
        <div class="score-dial">
            <canvas id="dialCanvas" width="140" height="140"></canvas>
            <div class="score-dial-label">
                <div class="score-number ${esc(s.color)}">${s.value}</div>
                <div class="score-label-text">/100</div>
            </div>
        </div>
        <div class="score-info">
            <h3>Score de confiance COMEP — ${esc(r.project?.name || '—')}</h3>
            <span class="score-level ${esc(s.color)}">${esc(s.level)}</span>
            <div class="score-components">${compItems}</div>
        </div>
    </div>`;
}

function drawDial(score) {
    const canvas = document.getElementById('dialCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 140, H = 140, R = 58, cx = 70, cy = 78;
    ctx.clearRect(0, 0, W, H);

    // Background arc
    ctx.beginPath();
    ctx.arc(cx, cy, R, Math.PI, 2 * Math.PI);
    ctx.strokeStyle = '#dee2e6';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Value arc
    const pct = Math.min(score.value / 100, 1);
    const startAngle = Math.PI;
    const endAngle   = Math.PI + pct * Math.PI;
    const arcColor = score.value >= 80 ? '#28a745' : score.value >= 60 ? '#e8a020' : '#dc3545';
    ctx.beginPath();
    ctx.arc(cx, cy, R, startAngle, endAngle);
    ctx.strokeStyle = arcColor;
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.stroke();
}

function renderKPIs(r) {
    const s = r.summary;
    const items = [
        { label: 'Scénarios',  val: s.totalScenarios, color: 'gray',   sub: 'rédigés' },
        { label: 'Acceptés',   val: s.accepted,        color: 'green',  sub: `${s.coverageRate}% couverture` },
        { label: 'TNR',        val: s.tnr,             color: 'purple', sub: 'non-régression' },
        { label: 'Référencés', val: s.withRef,         color: s.traceRate >= 70 ? 'green' : 'amber', sub: `${s.traceRate}% tracés` },
        { label: 'Taux pass',  val: s.lastPassRate !== null ? s.lastPassRate + '%' : '—', color: rateColor(s.lastPassRate || 0), sub: 'dernière campagne' },
        { label: 'Taux fuite', val: s.lastLeakRate !== null ? s.lastLeakRate + '%' : '—', color: (s.lastLeakRate || 0) <= 10 ? 'green' : (s.lastLeakRate || 0) <= 20 ? 'amber' : 'red', sub: 'FAIL + BLOQUÉ' }
    ];
    const html = items.map(i => `
        <div class="kpi">
            <div class="kpi-label">${i.label}</div>
            <div class="kpi-val ${esc(i.color)}">${i.val}</div>
            <div class="kpi-sub">${i.sub}</div>
        </div>`).join('');
    return `<div class="section"><div class="section-title">Indicateurs clés</div><div class="kpi-grid">${html}</div></div>`;
}

function renderFeatures(r) {
    if (!r.features || r.features.length === 0) return `<div class="section"><div class="section-title">Couverture par feature</div><p style="color:var(--text-muted);font-size:0.88rem;">Aucune feature détectée.</p></div>`;
    const rows = r.features.map(f => {
        const cc = rateColor(f.coverage_pct);
        return `<tr>
            <td>${esc(f.name)}</td>
            <td>${f.total}</td>
            <td>${f.high > 0 ? `<span class="badge high">${f.high}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
            <td>
                <div class="cov-bar-wrap">
                    <div class="cov-bar"><div class="cov-bar-fill ${cc}" style="width:${f.coverage_pct}%"></div></div>
                    <span class="cov-pct ${cc}">${f.coverage_pct}%</span>
                </div>
            </td>
        </tr>`;
    }).join('');
    return `<div class="section">
        <div class="section-title">Couverture par feature</div>
        <table class="feat">
            <thead><tr><th>Feature</th><th>Total</th><th>Critiques</th><th>Couverture</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

function renderTrend(r) {
    if (!r.trend || r.trend.length === 0) return `<div class="section"><div class="section-title">Tendance des campagnes</div><p style="color:var(--text-muted);font-size:0.88rem;">Aucune campagne archivée.</p></div>`;
    const items = r.trend.map(c => {
        const cc = rateColor(c.pass_rate);
        return `<div class="trend-item">
            <span class="trend-name">${esc(c.name)}</span>
            <div class="trend-bar-outer"><div class="trend-bar-inner ${cc}" style="width:${c.pass_rate}%"></div></div>
            <span class="trend-pct" style="color:var(--${cc === 'green' ? 'success' : cc === 'amber' ? 'warning' : 'danger'});">${c.pass_rate}%</span>
        </div>`;
    }).join('');
    return `<div class="section">
        <div class="section-title">Tendance (${r.trend.length} dernière${r.trend.length > 1 ? 's' : ''} campagne${r.trend.length > 1 ? 's' : ''})</div>
        <div class="trend-list">${items}</div>
    </div>`;
}

function renderRisks(r) {
    const risks = r.residualRisks || [];
    if (risks.length === 0) {
        return `<div class="section">
            <div class="section-title">Risques résiduels</div>
            <p style="color:var(--success);font-weight:600;font-size:0.9rem;">Aucun risque résiduel identifié.</p>
        </div>`;
    }
    const highCount   = risks.filter(r => r.level === 'HIGH').length;
    const medCount    = risks.filter(r => r.level === 'MEDIUM').length;
    const sortedRisks = [...risks].sort((a, b) =>
        (a.level === 'HIGH' ? 0 : a.level === 'MEDIUM' ? 1 : 2) -
        (b.level === 'HIGH' ? 0 : b.level === 'MEDIUM' ? 1 : 2)
    );
    const items = sortedRisks.map(risk => `
        <div class="risk-item">
            <div class="risk-level-dot ${esc(risk.level)}"></div>
            <div class="risk-info">
                <div class="risk-title">${esc(risk.id || '—')} — ${esc(risk.title)}</div>
                <div class="risk-reason">${esc(risk.reason)}${risk.comment ? ' · ' + esc(risk.comment) : ''}</div>
            </div>
            <span class="risk-badge ${esc(risk.level)}">${esc(risk.level)}</span>
        </div>`).join('');
    return `<div class="section">
        <div class="section-title">Risques résiduels
            ${highCount > 0 ? `<span style="font-size:0.72rem;background:#f8d7da;color:#721c24;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px;">${highCount} HIGH</span>` : ''}
            ${medCount > 0 ? `<span style="font-size:0.72rem;background:#fff3cd;color:#856404;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:4px;">${medCount} MEDIUM</span>` : ''}
        </div>
        ${items}
    </div>`;
}

function renderRecommendations(r) {
    const recs = r.recommendations || [];
    const icons = { HIGH: '🔴', MEDIUM: '🟡', LOW: '🟢' };
    const items = recs.map(rec => `
        <div class="rec-item ${esc(rec.priority)}">
            <span class="rec-icon">${icons[rec.priority] || '•'}</span>
            <span class="rec-text">${esc(rec.text)}</span>
            <span class="rec-prio ${esc(rec.priority)}">${esc(rec.priority)}</span>
        </div>`).join('');
    return `<div class="section"><div class="section-title">Recommandations avant COMEP</div>${items}</div>`;
}

function renderLastCampaign(r) {
    const c = r.lastCampaign;
    if (!c) return `<div class="section"><div class="section-title">Dernière campagne</div><p style="color:var(--text-muted);font-size:0.88rem;">Aucune campagne terminée. <a href="campagne.html">Lancer une campagne →</a></p></div>`;
    const passRate = c.total > 0 ? Math.round(c.pass / c.total * 100) : 0;
    return `<div class="section">
        <div class="section-title">Dernière campagne — ${esc(c.name || '—')} (${fmtDate(c.date)})</div>
        <div class="camp-summary">
            <div class="camp-metric" style="background:#d4edda;"><div class="camp-metric-val" style="color:var(--success);">${c.pass}</div><div class="camp-metric-label">PASS</div></div>
            <div class="camp-metric" style="background:#f8d7da;"><div class="camp-metric-val" style="color:var(--danger);">${c.fail}</div><div class="camp-metric-label">FAIL</div></div>
            <div class="camp-metric" style="background:var(--purple-light);"><div class="camp-metric-val" style="color:var(--purple);">${c.blocked}</div><div class="camp-metric-label">BLOQUÉ</div></div>
            <div class="camp-metric" style="background:var(--bg-alt);"><div class="camp-metric-val" style="color:var(--text-muted);">${c.skipped}</div><div class="camp-metric-label">PASSÉ</div></div>
        </div>
        <p style="margin-top:12px;font-size:0.85rem;color:var(--text-muted);">
            ${c.total} scénarios testés · <strong style="color:${passRate >= 80 ? 'var(--success)' : passRate >= 60 ? 'var(--warning)' : 'var(--danger)'};">${passRate}% de succès</strong>
        </p>
    </div>`;
}

function renderAnalysis(r) {
    const a = r.lastAnalysis;
    const ambiguities = a.ambiguities || [];
    const regRisks    = a.regression_risks || [];
    return `<div class="section">
        <div class="section-title">Analyse IA — ${esc(a.feature_detected || '—')} (${fmtDate(a.date)})</div>
        <p style="font-size:0.85rem;margin-bottom:10px;">
            Complexité : <strong>${esc(a.complexity || '—')}</strong>
            ${ambiguities.length > 0 ? ` · ${ambiguities.length} ambiguïté(s) détectée(s)` : ''}
            ${regRisks.length > 0 ? ` · ${regRisks.length} risque(s) de régression` : ''}
        </p>
        ${ambiguities.length > 0 ? `<ul style="margin:0 0 8px 18px;font-size:0.85rem;">${ambiguities.map(a => `<li>${esc(a)}</li>`).join('')}</ul>` : ''}
    </div>`;
}

function renderEmpty(type) {
    if (type === 'project') return `<div class="empty"><div class="empty-icon">📁</div><p style="font-weight:600;">Aucun projet sélectionné</p><p>Sélectionnez un projet pour générer son rapport COMEP.</p></div>`;
    return `<div class="empty"><div class="empty-icon">📋</div><p style="font-weight:600;">Aucune donnée disponible</p></div>`;
}

// ── Commentaire COMEP généré par l'IA ────────────────
async function generateNarrative() {
    if (!state.report) return;
    if (!TestPilotAPI?.LLM?.call) {
        alert('Module LLM non disponible. Configurez un provider IA dans les paramètres.');
        return;
    }
    const btn = document.getElementById('btnNarrative');
    const block = document.getElementById('narrativeBlock');
    if (!block) return;

    btn.disabled = true;
    btn.textContent = 'Génération en cours…';
    block.style.display = 'block';
    block.innerHTML = '<div class="section"><div style="color:var(--text-muted);font-size:0.9rem;">Interrogation du modèle IA…</div></div>';

    const r = state.report;
    const highRisks   = (r.residualRisks || []).filter(x => x.level === 'HIGH').length;
    const mediumRisks = (r.residualRisks || []).filter(x => x.level === 'MEDIUM').length;
    const topRecs     = (r.recommendations || []).slice(0, 3).map(x => x.text).join(' | ');

    const prompt = `Tu es un expert QA senior. Rédige un commentaire de passage en COMEP (2 à 3 paragraphes, ton formel, en français) à partir de ces indicateurs qualité :\n\nProjet : ${r.project?.name || '—'}\nScore de confiance : ${r.score.value}/100 (${r.score.level})\nCouverture des scénarios : ${r.summary.coverageRate}%\nTraçabilité exigences : ${r.summary.traceRate}%\nTaux de succès (dernière campagne) : ${r.summary.lastPassRate !== null ? r.summary.lastPassRate + '%' : 'non disponible'}\nTaux de fuite : ${r.summary.lastLeakRate !== null ? r.summary.lastLeakRate + '%' : 'non disponible'}\nScénarios TNR : ${r.summary.tnr}\nRisques résiduels HIGH : ${highRisks} | MEDIUM : ${mediumRisks}\nPrincipales recommandations : ${topRecs || '—'}\n\nLe commentaire doit :\n1. Rappeler brièvement le contexte et les résultats clés\n2. Mentionner les principaux points de risque ou de vigilance\n3. Conclure par une recommandation go/no-go motivée et claire\n\nRéponds uniquement avec le texte du commentaire, sans titre ni balise.`;

    try {
        const narrative = await TestPilotAPI.LLM.call(prompt, { maxTokens: 600 });
        state.narrative = narrative; // store for export
        const paras = narrative.split(/\n+/).filter(Boolean).map(p => `<p style="margin:0 0 12px;">${esc(p)}</p>`).join('');
        block.innerHTML = `
            <div class="section">
                <div class="section-title">Commentaire COMEP — Généré par IA</div>
                <div style="font-size:0.9rem;line-height:1.7;color:var(--text);">${paras}</div>
                <div style="font-size:0.72rem;color:var(--text-muted);margin-top:10px;">Généré le ${new Date().toLocaleString('fr-FR')} — à relire et adapter avant présentation.</div>
            </div>`;
    } catch(e) {
        const isConfig = /manquante|inaccessible|Ollama|provider|modèle/i.test(e.message);
        block.innerHTML = `<div class="section"><div style="color:var(--danger);font-size:0.88rem;">${isConfig ? 'Configuration IA requise : ' : 'Erreur : '}${esc(e.message)}</div></div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Commentaire COMEP IA';
    }
}

// ── Export HTML ────────────────────────────────────────
function exportHTML() {
    if (!state.report) return;
    const content = document.getElementById('reportContent').innerHTML;
    const r = state.report;
    const narrativeSection = state.narrative
        ? `<div style="background:#eaf4e8;border-left:4px solid #3B6D11;border-radius:8px;padding:16px 20px;margin-bottom:24px;">
               <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#3B6D11;margin-bottom:10px;">Commentaire COMEP — Généré par IA</div>
               ${state.narrative.split(/\n+/).filter(Boolean).map(p => `<p style="margin:0 0 10px;font-size:0.9rem;line-height:1.7;">${esc(p)}</p>`).join('')}
           </div>`
        : '';
    const html = `<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<title>Rapport COMEP — ${esc(r.project?.name || '')} — ${new Date().toLocaleDateString('fr-FR')}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; margin: 0; padding: 20px; }
  .container { max-width: 960px; margin: 0 auto; }
  ${document.querySelector('style').textContent}
</style>
</head><body>
<div class="container">
  <h1 style="color:#3B6D11;margin-bottom:8px;">Rapport COMEP — ${esc(r.project?.name || '—')}</h1>
  <p style="color:#6c757d;margin-bottom:24px;">Généré le ${fmtDateTime(r.generated_at)}</p>
  ${narrativeSection}
  ${content}
</div>
</body></html>`;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `comep-${(r.project?.name || 'rapport').toLowerCase().replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

function printReport() {
    window.print();
}

// ── Project ────────────────────────────────────────────
async function onProjectChange(projectId) {
    state.projectId = projectId;
    await loadReport();
}

TestPilotAPI.renderProjectSelector('projectSelectorContainer', onProjectChange).then(() => {
    const stored = TestPilotAPI.getCurrentProjectId();
    if (stored && !state.projectId) {
        state.projectId = stored;
        loadReport();
    } else if (!state.projectId) {
        document.getElementById('reportContent').innerHTML = renderEmpty('project');
    }
});

window.addEventListener('focus', () => { if (state.projectId) loadReport(); });
</script>
</body>
</html>
