<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestPilot — Campagne</title>
    <link rel="stylesheet" href="styles-prompt-library.css">
    <style>
        :root {
            --primary: #3B6D11;
            --primary-dark: #2d5309;
            --bg: #ffffff;
            --bg-alt: #f8f9fa;
            --text: #212529;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #e8a020;
            --blocked: #534AB7;
            --blocked-light: #EEEDFE;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-alt); color: var(--text); min-height: 100vh; }

        /* Nav */
        .nav { background: white; border-bottom: 2px solid var(--primary); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .nav-brand { color: var(--primary); font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-brand::before { content: '✈'; }
        .nav-links { display: flex; gap: 4px; }
        .nav-link { padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; text-decoration: none; color: var(--text-muted); transition: all .15s; }
        .nav-link:hover { background: var(--bg-alt); color: var(--text); }
        .nav-link.active { background: rgba(59,109,17,0.1); color: var(--primary); }

        .container { max-width: 760px; margin: 0 auto; padding: 28px 20px; }

        /* Campaign selector */
        .campaign-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .campaign-header h2 { font-size: 1.2rem; font-weight: 700; }
        .campaign-actions { display: flex; gap: 10px; }

        /* Progress bar */
        .progress-wrap { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 24px; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .progress-title { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
        .progress-pos { font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .progress-track { height: 8px; background: var(--bg-alt); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; border-radius: 4px; background: var(--primary); transition: width .3s ease; }
        .progress-stats { display: flex; gap: 16px; }
        .pstat { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .pstat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .pstat-dot.pass    { background: var(--success); }
        .pstat-dot.fail    { background: var(--danger); }
        .pstat-dot.blocked { background: var(--blocked); }
        .pstat-dot.pending { background: var(--border); border: 1px solid var(--text-muted); }

        /* Scenario card */
        .sc-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .sc-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .sc-id { font-family: monospace; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .sc-title { font-size: 1.2rem; font-weight: 700; }
        .sc-badges { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
        .badge { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
        .badge.functional { background: #d4edda; color: #155724; }
        .badge.negative   { background: #f8d7da; color: #721c24; }
        .badge.edge-case  { background: #d1ecf1; color: #0c5460; }
        .badge.boundary   { background: var(--blocked-light); color: var(--blocked); }
        .badge.high   { background: #f8d7da; color: #721c24; }
        .badge.medium { background: #fff3cd; color: #856404; }
        .badge.low    { background: #d4edda; color: #155724; }
        .badge.tnr    { background: var(--blocked); color: white; }

        /* GWT */
        .gwt { display: grid; gap: 12px; margin-bottom: 20px; }
        .gwt-row { border-left: 3px solid var(--border); padding-left: 14px; }
        .gwt-row.given  { border-color: #17a2b8; }
        .gwt-row.when   { border-color: var(--warning); }
        .gwt-row.then   { border-color: var(--primary); }
        .gwt-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 3px; }
        .gwt-text  { font-size: 0.95rem; color: var(--text); line-height: 1.5; }

        /* Comment */
        .comment-wrap { margin-bottom: 20px; }
        .comment-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .comment-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; font-family: inherit; resize: none; min-height: 64px; background: var(--bg-alt); }
        .comment-input:focus { outline: none; border-color: var(--primary); background: white; }

        /* Action buttons */
        .actions-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .action-btn { padding: 16px 12px; border: 2px solid; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .action-btn .btn-icon { font-size: 1.4rem; }
        .action-btn.pass-btn    { border-color: var(--success); color: var(--success); background: white; }
        .action-btn.fail-btn    { border-color: var(--danger);  color: var(--danger);  background: white; }
        .action-btn.blocked-btn { border-color: var(--blocked); color: var(--blocked); background: white; }
        .action-btn.pass-btn:hover    { background: #d4edda; }
        .action-btn.fail-btn:hover    { background: #f8d7da; }
        .action-btn.blocked-btn:hover { background: var(--blocked-light); }
        .action-btn.selected.pass-btn    { background: var(--success); color: white; }
        .action-btn.selected.fail-btn    { background: var(--danger);  color: white; }
        .action-btn.selected.blocked-btn { background: var(--blocked); color: white; }

        /* Nav buttons */
        .nav-row { display: flex; gap: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: white; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: .15s; }
        .nav-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .nav-btn.skip { color: var(--text-muted); }

        /* Résultats finaux */
        .results-panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 28px; text-align: center; margin-bottom: 24px; }
        .results-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; }
        .results-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .res-metric { padding: 16px; border-radius: 8px; }
        .res-metric.pass-bg    { background: #d4edda; }
        .res-metric.fail-bg    { background: #f8d7da; }
        .res-metric.blocked-bg { background: var(--blocked-light); }
        .res-metric.skip-bg    { background: var(--bg-alt); }
        .res-val   { font-size: 2rem; font-weight: 700; line-height: 1; }
        .res-val.green   { color: var(--success); }
        .res-val.red     { color: var(--danger); }
        .res-val.purple  { color: var(--blocked); }
        .res-val.gray    { color: var(--text-muted); }
        .res-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

        .result-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--bg-alt); text-align: left; }
        .result-row:last-child { border-bottom: none; }
        .res-status { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: white; flex-shrink: 0; }
        .res-status.pass    { background: var(--success); }
        .res-status.fail    { background: var(--danger); }
        .res-status.blocked { background: var(--blocked); }
        .res-status.skipped { background: var(--text-muted); }
        .res-info { flex: 1; }
        .res-sc-id    { font-family: monospace; font-size: 0.72rem; color: var(--text-muted); }
        .res-sc-title { font-size: 0.9rem; font-weight: 500; }
        .res-comment  { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-top: 2px; }
        .res-time     { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; }

        .btn-primary { padding: 12px 28px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: .15s; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { padding: 12px 24px; background: white; border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: .15s; }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

        /* Empty */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); background: white; border: 1px solid var(--border); border-radius: 12px; }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* TNR filter */
        .filter-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: .15s; }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .filter-btn.tnr { border-color: var(--blocked); color: var(--blocked); }
        .filter-btn.tnr.active { background: var(--blocked); color: white; }

        /* Campaign name */
        .campaign-name-row { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .campaign-name-label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
        .campaign-name-input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
        .campaign-name-input:focus { outline: none; border-color: var(--primary); }

        /* Saved badge */
        .saved-badge { font-size: 0.78rem; background: #d4edda; color: #155724; padding: 3px 10px; border-radius: 20px; font-weight: 600; }

        @media (max-width: 600px) {
            .actions-row { grid-template-columns: 1fr; }
            .results-grid { grid-template-columns: repeat(2,1fr); }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="index.html">TestPilot</a>
    <div id="projectSelectorContainer"></div>
    <div class="nav-links">
        <a class="nav-link" href="index.html">Rédaction</a>
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link active" href="campagne.html">Campagne</a>
        <a class="nav-link" href="historique.html">Historique</a>
        <a class="nav-link" href="import.html">Import</a>
        <a class="nav-link" href="tracabilite.html">Traçabilité</a>
        <a class="nav-link" href="clickup.html">ClickUp</a>
        <a class="nav-link" href="comep.html">COMEP</a>
        <a class="nav-link" href="export.html">Export</a>
    </div>
</nav>

<div class="container" id="app"></div>

<script src="api-client.js"></script>
<script>
function esc(t) { const d = document.createElement('div'); d.textContent = String(t||''); return d.innerHTML; }
function fmt(ms) {
    const d = new Date(ms);
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── State ─────────────────────────────────────────────
let state = {
    projectId: null,
    scenarios: [],
    session: { results: [], started: null, finished: false },
    cursor: 0,
    filterTNR: false,
    campaignSavedId: null   // ID BDD si la campagne a été archivée
};

// Session storage key per project
function getSessionKey() {
    return `testpilot_session_${state.projectId}`;
}

async function loadData() {
    if (!state.projectId) {
        renderNoProject();
        return;
    }
    
    try {
        const allScenarios = await TestPilotAPI.Scenarios.list(state.projectId, { accepted: true });
        state.scenarios = allScenarios.map(s => ({
            _dbId: s.id,
            id: s.scenario_id,
            title: s.title,
            type: s.scenario_type,
            priority: s.priority,
            given: s.given_text,
            when: s.when_text,
            then: s.then_text,
            feature: s.feature_name,
            is_tnr: !!s.is_tnr
        }));
        
        // Load session from localStorage
        try {
            const saved = JSON.parse(localStorage.getItem(getSessionKey()));
            if (saved && saved.scenarioCount === state.scenarios.length) {
                state.session = saved;
                state.cursor = state.session.results.length < state.scenarios.length 
                    ? state.session.results.length 
                    : state.scenarios.length;
            } else {
                state.session = { results: [], started: Date.now(), finished: false };
                state.cursor = 0;
            }
        } catch {
            state.session = { results: [], started: Date.now(), finished: false };
            state.cursor = 0;
        }
        
        render();
    } catch (e) {
        console.error('Erreur chargement:', e);
        const errEl = document.getElementById('app');
        errEl.textContent = '';
        const p = document.createElement('p');
        p.textContent = 'Erreur: ' + e.message;
        const div = document.createElement('div');
        div.className = 'empty';
        div.appendChild(p);
        errEl.appendChild(div);
    }
}

function saveSession() {
    state.session.scenarioCount = state.scenarios.length;
    localStorage.setItem(getSessionKey(), JSON.stringify(state.session));
}

function getFilteredScenarios() {
    return state.filterTNR 
        ? state.scenarios.filter(s => s.is_tnr)
        : state.scenarios;
}

// ── Render ────────────────────────────────────────────
function renderNoProject() {
    document.getElementById('app').innerHTML = `<div class="empty">
        <div class="empty-icon">📁</div>
        <p style="font-weight:600;margin-bottom:6px;">Aucun projet sélectionné</p>
        <p>Sélectionnez un projet dans le menu ci-dessus pour lancer une campagne.</p>
    </div>`;
}

function render() {
    const app = document.getElementById('app');
    const scenarios = getFilteredScenarios();
    const tnrCount = state.scenarios.filter(s => s.is_tnr).length;

    if (state.scenarios.length === 0) {
        app.innerHTML = `<div class="empty">
            <div class="empty-icon">◎</div>
            <p style="font-weight:600;margin-bottom:6px;">Aucun scénario accepté</p>
            <p>Accepte des scénarios dans <a href="index.html">la vue Rédaction</a> avant de lancer une campagne.</p>
        </div>`;
        return;
    }

    if (state.session.finished) { renderResults(); return; }

    const total   = scenarios.length;
    const done    = state.session.results.length;
    const pct     = Math.round(done / total * 100);
    const pass    = state.session.results.filter(r => r.status === 'pass').length;
    const fail    = state.session.results.filter(r => r.status === 'fail').length;
    const blocked = state.session.results.filter(r => r.status === 'blocked').length;
    const pending = total - done;

    if (state.cursor >= total && total > 0) { finishSession(); return; }

    if (total === 0) {
        app.innerHTML = `
            <div class="filter-row">
                <button class="filter-btn ${!state.filterTNR ? 'active' : ''}" onclick="setFilter(false)">
                    Tous (${state.scenarios.length})
                </button>
                <button class="filter-btn tnr ${state.filterTNR ? 'active' : ''}" onclick="setFilter(true)">
                    TNR uniquement (${tnrCount})
                </button>
            </div>
            <div class="empty">
                <div class="empty-icon">◎</div>
                <p style="font-weight:600;margin-bottom:6px;">Aucun scénario TNR</p>
                <p>Marquez des scénarios comme TNR dans <a href="index.html">la vue Rédaction</a>.</p>
            </div>`;
        return;
    }

    const sc = scenarios[state.cursor];
    const existing = state.session.results[state.cursor];
    const currentStatus = existing ? existing.status : null;
    const currentComment = existing ? (existing.comment || '') : '';
    const campaignName = state.session.name || '';

    app.innerHTML = `
        <div class="filter-row">
            <button class="filter-btn ${!state.filterTNR ? 'active' : ''}" onclick="setFilter(false)">
                Tous (${state.scenarios.length})
            </button>
            <button class="filter-btn tnr ${state.filterTNR ? 'active' : ''}" onclick="setFilter(true)">
                TNR uniquement (${tnrCount})
            </button>
            <button class="btn-secondary" style="margin-left:auto;" onclick="resetSession()">Nouvelle campagne</button>
        </div>

        <div class="campaign-name-row">
            <span class="campaign-name-label">Nom de la campagne :</span>
            <input class="campaign-name-input" type="text" id="campaignNameInput"
                value="${esc(campaignName)}"
                placeholder="Ex : Sprint 24 — TNR ATHENA v3.2"
                onchange="state.session.name = this.value; saveSession();">
        </div>
        
        <div class="progress-wrap">
            <div class="progress-header">
                <span class="progress-title">Progression ${state.filterTNR ? '(TNR)' : ''}</span>
                <span class="progress-pos">${state.cursor + 1} / ${total}</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-stats">
                <span class="pstat"><span class="pstat-dot pass"></span>${pass} Pass</span>
                <span class="pstat"><span class="pstat-dot fail"></span>${fail} Fail</span>
                <span class="pstat"><span class="pstat-dot blocked"></span>${blocked} Bloqué</span>
                <span class="pstat"><span class="pstat-dot pending"></span>${pending} restant${pending > 1 ? 's' : ''}</span>
            </div>
        </div>

        <div class="sc-card">
            <div class="sc-card-top">
                <div>
                    <div class="sc-id">${esc(sc.id || ('SC-' + String(state.cursor+1).padStart(3,'0')))} ${sc.is_tnr ? '<span class="badge tnr">TNR</span>' : ''}</div>
                    <div class="sc-title">${esc(sc.title)}</div>
                </div>
                <div class="sc-badges">
                    <span class="badge ${esc(sc.type)}">${esc(sc.type)}</span>
                    <span class="badge ${esc(sc.priority)}">${esc(sc.priority)}</span>
                </div>
            </div>

            <div class="gwt">
                <div class="gwt-row given">
                    <div class="gwt-label">Given</div>
                    <div class="gwt-text">${esc(sc.given)}</div>
                </div>
                <div class="gwt-row when">
                    <div class="gwt-label">When</div>
                    <div class="gwt-text">${esc(sc.when)}</div>
                </div>
                <div class="gwt-row then">
                    <div class="gwt-label">Then</div>
                    <div class="gwt-text">${esc(sc.then)}</div>
                </div>
            </div>

            <div class="comment-wrap">
                <div class="comment-label">Commentaire (optionnel — bug ref, note, capture)</div>
                <textarea class="comment-input" id="comment" placeholder="Ex : bug #142, écran blanc au chargement…">${esc(currentComment)}</textarea>
            </div>

            <div class="actions-row">
                <button class="action-btn pass-btn ${currentStatus==='pass'?'selected':''}"
                        onclick="record('pass')">
                    <span class="btn-icon">✓</span>PASS
                </button>
                <button class="action-btn fail-btn ${currentStatus==='fail'?'selected':''}"
                        onclick="record('fail')">
                    <span class="btn-icon">✗</span>FAIL
                </button>
                <button class="action-btn blocked-btn ${currentStatus==='blocked'?'selected':''}"
                        onclick="record('blocked')">
                    <span class="btn-icon">⊘</span>BLOQUÉ
                </button>
            </div>

            <div class="nav-row">
                <button class="nav-btn" onclick="prev()" ${state.cursor === 0 ? 'disabled' : ''}>← Précédent</button>
                <button class="nav-btn skip" onclick="skip()">Passer</button>
                <button class="nav-btn" onclick="next()" ${state.cursor >= total-1 && !currentStatus ? 'disabled' : ''}>
                    ${state.cursor >= total - 1 ? 'Terminer la campagne' : 'Suivant →'}
                </button>
            </div>
        </div>`;
}

function renderResults() {
    const app = document.getElementById('app');
    const scenarios = getFilteredScenarios();
    const total = scenarios.length;
    const pass  = state.session.results.filter(r => r.status === 'pass').length;
    const fail  = state.session.results.filter(r => r.status === 'fail').length;
    const blk   = state.session.results.filter(r => r.status === 'blocked').length;
    const skip  = state.session.results.filter(r => r.status === 'skipped').length;
    const pct   = total > 0 ? Math.round(pass / total * 100) : 0;

    const rows = scenarios.map((sc, i) => {
        const r = state.session.results[i] || { status: 'skipped', comment: '', ts: null };
        const labels = { pass: 'OK', fail: 'KO', blocked: 'BLK', skipped: '—' };
        return `<div class="result-row">
            <div class="res-status ${r.status}">${labels[r.status]}</div>
            <div class="res-info">
                <div class="res-sc-id">${esc(sc.id || ('SC-' + String(i+1).padStart(3,'0')))} ${sc.is_tnr ? '<span class="badge tnr" style="font-size:0.6rem;padding:1px 5px;">TNR</span>' : ''}</div>
                <div class="res-sc-title">${esc(sc.title)}</div>
                ${r.comment ? `<div class="res-comment">${esc(r.comment)}</div>` : ''}
            </div>
            <div class="res-time">${r.ts ? fmt(r.ts) : '—'}</div>
        </div>`;
    }).join('');

    app.innerHTML = `
        <div class="results-panel">
            <div class="results-title">Campagne terminée ${state.filterTNR ? '(TNR)' : ''}</div>
            <div class="results-grid">
                <div class="res-metric pass-bg">
                    <div class="res-val green">${pass}</div>
                    <div class="res-label">Pass</div>
                </div>
                <div class="res-metric fail-bg">
                    <div class="res-val red">${fail}</div>
                    <div class="res-label">Fail</div>
                </div>
                <div class="res-metric blocked-bg">
                    <div class="res-val purple">${blk}</div>
                    <div class="res-label">Bloqué</div>
                </div>
                <div class="res-metric skip-bg">
                    <div class="res-val gray">${skip}</div>
                    <div class="res-label">Passé</div>
                </div>
            </div>
            <div style="font-size:2rem;font-weight:700;color:${pct>=70?'var(--success)':pct>=40?'var(--warning)':'var(--danger)'};margin-bottom:20px;">
                ${pct}% de succès
            </div>
            <div style="text-align:left;margin-bottom:24px;">${rows}</div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                <button class="btn-primary" onclick="exportResults()">Exporter les résultats JSON</button>
                ${(fail + blk) > 0 ? `<button class="btn-secondary" id="btnAnalyzeAI" onclick="analyzeFailures()">Analyser les échecs avec l\'IA</button>` : ''}
                <button class="btn-secondary" onclick="resetSession()">Nouvelle campagne</button>
                <a href="historique.html" style="text-decoration:none;"><button class="btn-secondary">Voir l'historique</button></a>
                <a href="dashboard.html" style="text-decoration:none;"><button class="btn-secondary">Voir le dashboard</button></a>
            </div>
            <div id="aiAnalysisBlock" style="display:none;margin-top:24px;text-align:left;background:var(--bg-alt,#f8f9fa);border:1px solid #dee2e6;border-radius:10px;padding:20px;"></div>
        </div>`;
}

// ── Actions ────────────────────────────────────────────
function setFilter(tnrOnly) {
    state.filterTNR = tnrOnly;
    state.session = { results: [], started: Date.now(), finished: false };
    state.cursor = 0;
    saveSession();
    render();
}

function record(status) {
    const comment = document.getElementById('comment')?.value.trim() || '';
    state.session.results[state.cursor] = { status, comment, ts: Date.now() };
    saveSession();
    const scenarios = getFilteredScenarios();
    if (state.cursor < scenarios.length - 1) {
        state.cursor++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        render();
    }
}

function next() {
    const scenarios = getFilteredScenarios();
    if (state.cursor < scenarios.length - 1) {
        state.cursor++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        finishSession();
    }
}

function prev() {
    if (state.cursor > 0) { state.cursor--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

function skip() {
    if (!state.session.results[state.cursor]) {
        state.session.results[state.cursor] = { status: 'skipped', comment: '', ts: Date.now() };
        saveSession();
    }
    const scenarios = getFilteredScenarios();
    if (state.cursor < scenarios.length - 1) {
        state.cursor++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        finishSession();
    }
}

function finishSession() {
    const scenarios = getFilteredScenarios();
    for (let i = 0; i < scenarios.length; i++) {
        if (!state.session.results[i]) {
            state.session.results[i] = { status: 'skipped', comment: '', ts: null };
        }
    }
    state.session.finished = true;
    state.session.finishedAt = Date.now();
    saveSession();
    archiveCampaign(); // Archivage BDD automatique
    renderResults();
}

async function archiveCampaign() {
    if (!state.projectId) return;
    const scenarios = getFilteredScenarios();
    const results = state.session.results;

    const pass    = results.filter(r => r.status === 'pass').length;
    const fail    = results.filter(r => r.status === 'fail').length;
    const blocked = results.filter(r => r.status === 'blocked').length;
    const skipped = results.filter(r => r.status === 'skipped').length;

    const started_at  = state.session.started  ? new Date(state.session.started).toISOString() : new Date().toISOString();
    const finished_at = state.session.finishedAt ? new Date(state.session.finishedAt).toISOString() : new Date().toISOString();

    const name = state.session.name ||
        `Campagne ${state.filterTNR ? 'TNR' : ''} — ${new Date().toLocaleDateString('fr-FR')}`;

    const detailedResults = scenarios.map((sc, i) => ({
        id:      sc.id || ('SC-' + String(i+1).padStart(3,'0')),
        title:   sc.title,
        feature: sc.feature || null,
        type:    sc.type,
        is_tnr:  sc.is_tnr,
        status:  results[i]?.status || 'skipped',
        comment: results[i]?.comment || ''
    }));

    try {
        const saved = await TestPilotAPI.Campaigns.save(state.projectId, {
            name,
            type:        state.filterTNR ? 'TNR' : 'ALL',
            started_at,
            finished_at,
            total:   scenarios.length,
            pass, fail, blocked, skipped,
            results: detailedResults
        });
        state.campaignSavedId = saved.id;
        // Affiche badge "Archivée"
        const badge = document.createElement('span');
        badge.className = 'saved-badge';
        badge.textContent = 'Archivée dans l\'historique ✓';
        badge.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:999;padding:8px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);';
        document.body.appendChild(badge);
        setTimeout(() => badge.remove(), 3500);
    } catch (e) {
        console.warn('Archivage campagne échoué:', e.message);
    }
}

// ── Analyse IA des échecs ─────────────────────────────
async function analyzeFailures() {
    if (!TestPilotAPI?.LLM?.call) {
        alert('Module LLM non disponible. Configurez un provider IA dans les paramètres.');
        return;
    }
    const btn = document.getElementById('btnAnalyzeAI');
    const block = document.getElementById('aiAnalysisBlock');
    if (!block) return;

    btn.disabled = true;
    btn.textContent = 'Analyse en cours…';
    block.style.display = 'block';
    block.innerHTML = '<div style="color:#6c757d;font-size:0.9rem;">Interrogation du modèle IA…</div>';

    const scenarios = getFilteredScenarios();
    const failed = scenarios
        .map((sc, i) => ({ sc, r: state.session.results[i] }))
        .filter(({ r }) => r && (r.status === 'fail' || r.status === 'blocked'));

    const lines = failed.map(({ sc, r }) =>
        `- [${r.status.toUpperCase()}] ${sc.id || ('SC-' + String(scenarios.indexOf(sc)+1).padStart(3,'0'))} — ${sc.title}` +
        (sc.feature ? ` (feature : ${sc.feature})` : '') +
        (r.comment ? `\n  Commentaire testeur : ${r.comment}` : '')
    ).join('\n');

    const campaignName = state.session.name || 'Campagne sans nom';
    const prompt = `Tu es un expert QA senior. Voici les scénarios en échec lors de la campagne "${campaignName}" :\n\n${lines}\n\nGénère une analyse structurée en JSON avec :\n1. "summary" : tableau de 3 bullets résumant les zones à risque\n2. "causes" : tableau d'objets { "feature": "...", "cause": "..." } groupant les causes probables par feature\n3. "actions" : tableau de 3 actions correctives prioritaires\n\nRéponds uniquement avec le JSON, sans markdown.`;

    try {
        const raw  = await TestPilotAPI.LLM.call(prompt, { maxTokens: 800 });
        const json = JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0] || raw);

        const summaryHtml = (json.summary || []).map(s => `<li>${esc(s)}</li>`).join('');
        const causesHtml  = (json.causes  || []).map(c => `<li><strong>${esc(c.feature)}</strong> — ${esc(c.cause)}</li>`).join('');
        const actionsHtml = (json.actions || []).map(a => `<li>${esc(a)}</li>`).join('');

        block.innerHTML = `
            <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#6c757d;margin-bottom:14px;">Analyse IA des échecs — ${esc(campaignName)}</div>
            <div style="margin-bottom:14px;">
                <div style="font-weight:600;margin-bottom:6px;">Zones à risque</div>
                <ul style="margin:0 0 0 16px;font-size:0.88rem;">${summaryHtml}</ul>
            </div>
            <div style="margin-bottom:14px;">
                <div style="font-weight:600;margin-bottom:6px;">Causes probables par feature</div>
                <ul style="margin:0 0 0 16px;font-size:0.88rem;">${causesHtml}</ul>
            </div>
            <div>
                <div style="font-weight:600;margin-bottom:6px;">Actions correctives prioritaires</div>
                <ol style="margin:0 0 0 16px;font-size:0.88rem;">${actionsHtml}</ol>
            </div>`;
    } catch(e) {
        const isConfig = /manquante|inaccessible|Ollama|provider|modèle/i.test(e.message);
        block.innerHTML = `<div style="color:#dc3545;font-size:0.88rem;">${isConfig ? 'Configuration IA requise : ' : 'Erreur : '}${esc(e.message)}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Analyser les échecs avec l\'IA';
    }
}

function resetSession() {
    state.session = { results: [], started: Date.now(), finished: false };
    state.cursor = 0;
    saveSession();
    render();
}

function exportResults() {
    const scenarios = getFilteredScenarios();
    const data = {
        exportedAt: new Date().toISOString(),
        projectId: state.projectId,
        campaignType: state.filterTNR ? 'TNR' : 'ALL',
        summary: {
            total:   scenarios.length,
            pass:    state.session.results.filter(r => r.status === 'pass').length,
            fail:    state.session.results.filter(r => r.status === 'fail').length,
            blocked: state.session.results.filter(r => r.status === 'blocked').length,
            skipped: state.session.results.filter(r => r.status === 'skipped').length,
        },
        results: scenarios.map((sc, i) => ({
            id:      sc.id || ('SC-' + String(i+1).padStart(3,'0')),
            title:   sc.title,
            feature: sc.feature || null,
            type:    sc.type,
            priority:sc.priority,
            is_tnr:  sc.is_tnr,
            status:  state.session.results[i]?.status || 'skipped',
            comment: state.session.results[i]?.comment || '',
            executedAt: state.session.results[i]?.ts ? new Date(state.session.results[i].ts).toISOString() : null,
        }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `testpilot-campagne${state.filterTNR ? '-tnr' : ''}-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Project change handler ────────────────────────────
async function onProjectChange(projectId) {
    state.projectId = projectId;
    state.filterTNR = false;
    await loadData();
}

// ── Init ──────────────────────────────────────────────
TestPilotAPI.renderProjectSelector('projectSelectorContainer', onProjectChange).then(() => {
    // renderProjectSelector already calls onProjectChange when auto-selecting a project.
    // Only load if a project was previously stored but no auto-select happened.
    const stored = TestPilotAPI.getCurrentProjectId();
    if (stored && !state.projectId) {
        state.projectId = stored;
        loadData();
    } else if (!state.projectId) {
        renderNoProject();
    }
    }
});
</script>
