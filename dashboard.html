<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestPilot — Dashboard</title>
    <link rel="stylesheet" href="styles-prompt-library.css">
    <style>
        :root {
            --primary: #3B6D11;
            --primary-light: #4a8a1a;
            --bg: #ffffff;
            --bg-alt: #f8f9fa;
            --text: #212529;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #e8a020;
            --purple: #534AB7;
            --purple-light: #EEEDFE;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-alt); color: var(--text); line-height: 1.6; min-height: 100vh; }

        /* Nav */
        .nav { background: white; border-bottom: 2px solid var(--primary); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .nav-brand { color: var(--primary); font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-brand::before { content: '✈'; }
        .nav-links { display: flex; gap: 4px; }
        .nav-link { padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; text-decoration: none; color: var(--text-muted); transition: all .15s; }
        .nav-link:hover { background: var(--bg-alt); color: var(--text); }
        .nav-link.active { background: rgba(59,109,17,0.1); color: var(--primary); }

        .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

        /* Metric cards */
        .metrics { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; margin-bottom: 28px; }
        .metric { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
        .metric-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
        .metric-value { font-size: 2rem; font-weight: 700; line-height: 1; }
        .metric-value.green { color: var(--primary); }
        .metric-value.amber { color: var(--warning); }
        .metric-value.red   { color: var(--danger); }
        .metric-value.gray  { color: var(--text-muted); }
        .metric-value.purple { color: var(--purple); }
        .metric-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }

        /* Global progress */
        .global-progress { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 28px; }
        .gp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .gp-title { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
        .gp-pct { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
        .progress-track { height: 10px; background: var(--bg-alt); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 5px; background: var(--primary); transition: width .4s ease; }
        .progress-fill.warn { background: var(--warning); }
        .progress-fill.danger { background: var(--danger); }

        /* Section title */
        .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 14px; }

        /* Feature rows */
        .features { display: grid; gap: 12px; margin-bottom: 28px; }
        .feature-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
        .feature-card.expandable { cursor: pointer; }
        .feature-card.expandable:hover { border-color: var(--primary); }
        .feature-header { display: flex; align-items: center; gap: 14px; }
        .feature-status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .feature-status.covered  { background: var(--success); }
        .feature-status.partial  { background: var(--warning); }
        .feature-status.none     { background: var(--danger); }
        .feature-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .feature-bar-wrap { width: 180px; height: 8px; background: var(--bg-alt); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .feature-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
        .feature-bar.covered { background: var(--success); }
        .feature-bar.partial  { background: var(--warning); }
        .feature-bar.none     { background: var(--danger); width: 6px !important; }
        .feature-counts { font-size: 0.8rem; color: var(--text-muted); min-width: 64px; text-align: right; flex-shrink: 0; }
        .feature-badge { font-size: 0.72rem; padding: 2px 10px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
        .feature-badge.covered  { background: #d4edda; color: #155724; }
        .feature-badge.partial  { background: #fff3cd; color: #856404; }
        .feature-badge.none     { background: #f8d7da; color: #721c24; }

        /* Expandable scenario list */
        .feature-scenarios { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
        .feature-scenarios.open { display: block; }
        .sc-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--bg-alt); font-size: 0.875rem; }
        .sc-row:last-child { border-bottom: none; }
        .sc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
        .sc-dot.accepted { background: var(--success); }
        .sc-dot.pending  { background: var(--border); border: 1px solid var(--text-muted); }
        .sc-info { flex: 1; }
        .sc-id    { font-family: monospace; font-size: 0.72rem; color: var(--text-muted); }
        .sc-title { font-weight: 500; color: var(--text); }
        .sc-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 3px; }
        .sc-badge { font-size: 0.68rem; padding: 1px 7px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
        .sc-badge.functional { background: #d4edda; color: #155724; }
        .sc-badge.negative   { background: #f8d7da; color: #721c24; }
        .sc-badge.edge-case  { background: #d1ecf1; color: #0c5460; }
        .sc-badge.boundary   { background: var(--purple-light); color: var(--purple); }
        .sc-badge.high   { background: #f8d7da; color: #721c24; }
        .sc-badge.medium { background: #fff3cd; color: #856404; }
        .sc-badge.low    { background: #d4edda; color: #155724; }
        .sc-badge.tnr    { background: var(--purple); color: white; }
        .chevron { font-size: 0.75rem; color: var(--text-muted); transition: transform .2s; margin-left: auto; flex-shrink: 0; }
        .chevron.open { transform: rotate(90deg); }

        /* Empty / no data */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty p { margin-bottom: 6px; }
        .empty a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* Refresh btn */
        .refresh-btn { font-size: 0.85rem; padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: white; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: .15s; }
        .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Last updated */
        .last-updated { font-size: 0.75rem; color: var(--text-muted); }

        @media (max-width: 900px) {
            .metrics { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 700px) {
            .metrics { grid-template-columns: repeat(2, 1fr); }
            .feature-bar-wrap { width: 80px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="index.html">TestPilot</a>
    <div id="projectSelectorContainer"></div>
    <div class="nav-links">
        <a class="nav-link" href="index.html">Rédaction</a>
        <a class="nav-link active" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="campagne.html">Campagne</a>
        <a class="nav-link" href="historique.html">Historique</a>
        <a class="nav-link" href="import.html">Import</a>
        <a class="nav-link" href="tracabilite.html">Traçabilité</a>
        <a class="nav-link" href="clickup.html">ClickUp</a>
        <a class="nav-link" href="comep.html">COMEP</a>
        <a class="nav-link" href="export.html">Export</a>
    </div>
</nav>

<div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <div>
            <h2 style="font-size:1.3rem;font-weight:700;">Couverture de tests</h2>
            <div class="last-updated" id="lastUpdated"></div>
        </div>
        <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
    </div>

    <div id="appContent"></div>
</div>

<script src="api-client.js"></script>
<script>
let state = { projectId: null, scenarios: [] };

function esc(t) { const d = document.createElement('div'); d.textContent = String(t||''); return d.innerHTML; }

async function loadData() {
    if (!state.projectId) {
        document.getElementById('appContent').innerHTML = renderNoProject();
        return;
    }
    
    try {
        const scenarios = await TestPilotAPI.Scenarios.list(state.projectId);
        state.scenarios = scenarios.map(s => ({
            id: s.scenario_id,
            title: s.title,
            type: s.scenario_type,
            priority: s.priority,
            feature: s.feature_name,
            accepted: !!s.accepted,
            is_tnr: !!s.is_tnr
        }));
        render();
    } catch (e) {
        console.error('Erreur chargement:', e);
        const errEl = document.getElementById('appContent');
        errEl.textContent = '';
        const p = document.createElement('p');
        p.textContent = 'Erreur: ' + e.message;
        const div = document.createElement('div');
        div.className = 'empty';
        div.appendChild(p);
        errEl.appendChild(div);
    }
}

function groupByFeature(scenarios) {
    const map = {};
    for (const sc of scenarios) {
        const feat = sc.feature || 'Sans feature';
        if (!map[feat]) map[feat] = [];
        map[feat].push(sc);
    }
    return map;
}

function coverageClass(accepted, total) {
    if (total === 0) return 'none';
    const pct = accepted / total;
    if (pct >= 1)   return 'covered';
    if (pct >= 0.5) return 'partial';
    return 'none';
}

function coverageLabel(cls) {
    return { covered: 'Couvert', partial: 'Partiel', none: 'Aucun test' }[cls];
}

function renderNoProject() {
    return `<div class="empty">
        <div class="empty-icon">📁</div>
        <p style="font-weight:600;">Aucun projet sélectionné</p>
        <p>Sélectionnez un projet dans le menu ci-dessus pour voir sa couverture de tests.</p>
    </div>`;
}

function renderEmpty() {
    return `<div class="empty">
        <div class="empty-icon">◎</div>
        <p style="font-weight:600;">Aucun scénario trouvé</p>
        <p>Génère des scénarios dans <a href="index.html">la vue Rédaction</a> pour les voir apparaître ici.</p>
    </div>`;
}

function renderMetrics(scenarios) {
    const total    = scenarios.length;
    const accepted = scenarios.filter(s => s.accepted).length;
    const pct      = total > 0 ? Math.round(accepted / total * 100) : 0;
    const critiques = scenarios.filter(s => s.priority === 'high').length;
    const nonCouverts = scenarios.filter(s => !s.accepted).length;
    const tnrCount = scenarios.filter(s => s.is_tnr).length;

    const fillClass = pct >= 70 ? '' : pct >= 40 ? 'warn' : 'danger';
    const pctColor  = pct >= 70 ? 'green' : pct >= 40 ? 'amber' : 'red';

    return `
    <div class="metrics">
        <div class="metric">
            <div class="metric-label">Scénarios rédigés</div>
            <div class="metric-value gray">${total}</div>
            <div class="metric-sub">au total</div>
        </div>
        <div class="metric">
            <div class="metric-label">Acceptés</div>
            <div class="metric-value green">${accepted}</div>
            <div class="metric-sub">validés pour campagne</div>
        </div>
        <div class="metric">
            <div class="metric-label">TNR</div>
            <div class="metric-value purple">${tnrCount}</div>
            <div class="metric-sub">tests de non régression</div>
        </div>
        <div class="metric">
            <div class="metric-label">Priorité critique</div>
            <div class="metric-value ${critiques > 0 ? 'red' : 'gray'}">${critiques}</div>
            <div class="metric-sub">scénarios high</div>
        </div>
        <div class="metric">
            <div class="metric-label">Non couverts</div>
            <div class="metric-value ${nonCouverts > 0 ? 'amber' : 'green'}">${nonCouverts}</div>
            <div class="metric-sub">en attente</div>
        </div>
    </div>
    <div class="global-progress">
        <div class="gp-header">
            <span class="gp-title">Taux de couverture global</span>
            <span class="gp-pct ${pctColor}">${pct}%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
    </div>`;
}

function renderFeatures(grouped) {
    const feats = Object.entries(grouped);
    if (feats.length === 0) return '';

    const rows = feats.map(([feat, scenarios], fi) => {
        const total    = scenarios.length;
        const accepted = scenarios.filter(s => s.accepted).length;
        const pct      = total > 0 ? Math.round(accepted / total * 100) : 0;
        const cls      = coverageClass(accepted, total);

        const scRows = scenarios.map((sc, si) => `
            <div class="sc-row">
                <div class="sc-dot ${sc.accepted ? 'accepted' : 'pending'}"></div>
                <div class="sc-info">
                    <div class="sc-id">${esc(sc.id || ('SC-' + String(si+1).padStart(3,'0')))}</div>
                    <div class="sc-title">${esc(sc.title)}</div>
                    <div class="sc-badges">
                        <span class="sc-badge ${esc(sc.type)}">${esc(sc.type)}</span>
                        <span class="sc-badge ${esc(sc.priority)}">${esc(sc.priority)}</span>
                        ${sc.is_tnr ? '<span class="sc-badge tnr">TNR</span>' : ''}
                    </div>
                </div>
            </div>`).join('');

        return `
        <div class="feature-card expandable" onclick="toggleFeature(${fi})">
            <div class="feature-header">
                <div class="feature-status ${cls}"></div>
                <div class="feature-name">${esc(feat)}</div>
                <div class="feature-bar-wrap">
                    <div class="feature-bar ${cls}" style="width:${Math.max(pct,0)}%"></div>
                </div>
                <div class="feature-counts">${accepted}/${total}</div>
                <div class="feature-badge ${cls}">${coverageLabel(cls)}</div>
                <div class="chevron" id="chev-${fi}">▶</div>
            </div>
            <div class="feature-scenarios" id="feat-${fi}">
                ${scRows}
            </div>
        </div>`;
    }).join('');

    return `<div class="section-title">Couverture par feature — ${feats.length} feature${feats.length>1?'s':''}</div>
            <div class="features">${rows}</div>`;
}

function toggleFeature(i) {
    const list  = document.getElementById(`feat-${i}`);
    const chev  = document.getElementById(`chev-${i}`);
    const open  = list.classList.toggle('open');
    chev.classList.toggle('open', open);
}

function render() {
    const app = document.getElementById('appContent');
    const scenarios = state.scenarios;

    document.getElementById('lastUpdated').textContent =
        scenarios.length > 0
            ? `Dernière mise à jour : ${new Date().toLocaleTimeString('fr-FR')}`
            : '';

    if (scenarios.length === 0) {
        app.innerHTML = renderEmpty();
        return;
    }

    const grouped = groupByFeature(scenarios);
    app.innerHTML = renderMetrics(scenarios) + renderFeatures(grouped);
}

async function onProjectChange(projectId) {
    state.projectId = projectId;
    await loadData();
}

// Init
TestPilotAPI.renderProjectSelector('projectSelectorContainer', onProjectChange).then(() => {
    // renderProjectSelector already calls onProjectChange when auto-selecting a project.
    // Only load if a project was previously stored but no auto-select happened.
    const stored = TestPilotAPI.getCurrentProjectId();
    if (stored && !state.projectId) {
        state.projectId = stored;
        loadData();
    } else if (!state.projectId) {
        document.getElementById('appContent').innerHTML = renderNoProject();
    }
});

// Auto-refresh si l'onglet reprend le focus
window.addEventListener('focus', () => {
    if (state.projectId) loadData();
});
</script>
</body>
</html>
